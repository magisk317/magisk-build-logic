[versions]
agp = "9.1.0"
kotlin = "2.3.20"
google-services = "4.4.4"
ksp = "2.3.6"
hilt = "2.59.2"

[libraries]
android-gradlePlugin = { module = "com.android.tools.build:gradle", version.ref = "agp" }
google-services-gradlePlugin = { module = "com.google.gms:google-services", version.ref = "google-services" }
hilt-gradlePlugin = { module = "com.google.dagger:hilt-android-gradle-plugin", version.ref = "hilt" }
kotlin-compose-gradlePlugin = { module = "org.jetbrains.kotlin:compose-compiler-gradle-plugin", version.ref = "kotlin" }
